<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AGE Clock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Track your life in real-time with AGE TIMESTAMP">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root {
  --bg: #020617;
  --fg: #e5e7eb;
  --accent: #ef4444;
  --border: #1f2937;
  --muted: #9ca3af;
  --dark-muted: #6b7280;
}

* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(circle, #111827, var(--bg));
  font-family: 'Courier New', monospace;
  color: var(--fg);
  padding: 16px;
}

.theme-neon {
  --fg: #22d3ee;
  --accent: #22d3ee;
}

.theme-classic {
  --bg: #f8fafc;
  --fg: #020617;
  --accent: #2563eb;
  --border: #e2e8f0;
  --muted: #64748b;
  --dark-muted: #94a3b8;
}

.stopwatch {
  width: 100%;
  max-width: 500px;
  padding: 24px;

  /* 🔹 Dynamic border & radius */
  border-radius: clamp(16px, 5vw, 26px);
  border: clamp(1.5px, 0.6vw, 3px) solid transparent;

  background: var(--bg);
  background-image:
    linear-gradient(var(--bg), var(--bg)),
    linear-gradient(
      135deg,
      #ff0000,
      #ff7f00,
      #ffff00,
      #00ff00,
      #0000ff,
      #4b0082,
      #9400d3
    );

  background-origin: border-box;
  background-clip: padding-box, border-box;

  box-shadow:
    inset 0 0 30px rgba(0, 0, 0, 0.5),
    0 0 clamp(20px, 6vw, 40px) rgba(255, 0, 255, 0.2);

  transition: box-shadow 0.3s ease;
}
}

@media (prefers-reduced-motion: reduce) {
  .stopwatch {
    transition: none;
  }
}

.title {
  text-align: center;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--muted);
  margin: 0 0 12px 0;
  cursor: pointer;
  transition: color 0.2s ease;
  user-select: none;
  position: relative;
  display: inline-block;
  width: 100%;
}

.title:hover {
  color: var(--accent);
}

.title::after {
  content: ' ✎';
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.2s ease;
  margin-left: 4px;
}

.title:hover::after {
  opacity: 0.7;
}

.main-time {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  margin-top: 16px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbowShift 6s linear infinite;
}

@keyframes rainbowShift {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}

.labels {
  text-align: center;
  font-size: 11px;
  color: var(--dark-muted);
  margin-top: 6px;
  letter-spacing: 1px;
  font-weight: 600;
}

.next-birthday {
  text-align: center;
  font-size: 13px;
  margin-top: 10px;
  color: var(--fg);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.divider {
  height: 2px;
  background: linear-gradient(90deg, rgba(255,0,0,0), rgba(255,0,0,0.3), rgba(255,0,0,0));
  margin: 16px 0;
}

.row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 5px 0;
  color: var(--fg);
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.controls label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  padding: 4px 0;
  cursor: pointer;
}

.controls input[type="checkbox"],
.controls select {
  cursor: pointer;
  padding: 4px 6px;
  background: var(--border);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 4px;
}

.controls input[type="checkbox"] {
  width: 18px;
  height: 18px;
  cursor: pointer;
}

.controls select {
  min-width: 100px;
}

.footer {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  margin-top: 8px;
}

button {
  width: 100%;
  padding: 12px 16px;
  margin-top: 14px;
  background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: bold;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
  font-family: inherit;
  box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);
}

button:hover {
  opacity: 0.9;
  box-shadow: 0 6px 20px rgba(255, 0, 255, 0.5);
}

button:active {
  transform: scale(0.98);
}

.error-message {
  color: #ff6b6b;
  font-size: 12px;
  margin-top: 8px;
  text-align: center;
  display: none;
}

.error-message.show {
  display: block;
}

@media (max-width: 480px) {
  body {
    padding: 8px;
  }

  .stopwatch {
    padding: 16px;
    max-width: 100%;
  }

  .main-time {
    font-size: 22px;
    letter-spacing: 1px;
  }

  .row, .controls label {
    font-size: 12px;
  }

}

button:focus,
select:focus,
input:focus {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
</style>
</head>

<body>
<div class="stopwatch" id="watch">
  <div class="title" id="title" role="heading" aria-level="1" title="Click to edit name">SARATH P S - AGE Clock</div>

  <div class="main-time" id="mainTime" role="status" aria-live="off">00:00:00:00:00:00.000</div>
  <div class="labels">Y : M : D : H : M : S . ms</div>

  <div class="next-birthday" id="nextBirthdayTop" aria-live="polite"></div>

  <div class="divider" role="separator"></div>

  <div class="details">
    <div class="row"><span>Total Months</span><span id="tMonths" aria-label="total months lived">—</span></div>
    <div class="row"><span>Total Weeks</span><span id="tWeeks" aria-label="total weeks lived">—</span></div>
    <div class="row"><span>Total Days</span><span id="tDays" aria-label="total days lived">—</span></div>
    <div class="row"><span>Total Hours</span><span id="tHours" aria-label="total hours lived">—</span></div>
    <div class="row"><span>Total Minutes</span><span id="tMinutes" aria-label="total minutes lived">—</span></div>
    <div class="row"><span>Total Seconds</span><span id="tSeconds" aria-label="total seconds lived">—</span></div>
    <div class="row"><span>Heartbeats Lived ❤️</span><span id="heartbeats" aria-label="heartbeats lived">—</span></div>
  </div>

  <div class="divider" role="separator"></div>

  <div class="controls">
    <label for="theme">
      <span>Theme</span>
      <select id="theme" aria-label="Select color theme">
        <option value="">Dark</option>
        <option value="theme-neon">Neon</option>
        <option value="theme-classic">Classic</option>
      </select>
    </label>
    <label for="exact">
      <span>Exact Calendar</span>
      <input type="checkbox" id="exact" checked aria-label="Use exact calendar calculation">
    </label>
  </div>

  <button id="editBirth">🔐 Edit Birth Date</button>
  <button id="openMilestones">Life Milestones</button>
  <div class="error-message" id="errorMessage" role="alert"></div>
</div>

<script>
'use strict';

const CONFIG = {
  DEFAULT_BIRTH: '2000-11-13T07:09:00',
  DEFAULT_NAME: 'SARATH P S - AGE Clock',
  MILESTONES_URL: 'https://sarathsathyan13.github.io/age_clock/milestones.html',
  LIFE_EXPECTANCY_YEARS: 80,
  AVG_HEARTBEAT_BPM: 72,
  AVG_MONTHS_PER_YEAR: 12,
  AVG_DAYS_PER_YEAR: 365.2422,
  AVG_DAYS_PER_MONTH: 30.44
};

let birth = null;
let name = CONFIG.DEFAULT_NAME;
let animationFrameId = null;

const elements = {
  watch: document.getElementById('watch'),
  title: document.getElementById('title'),
  mainTime: document.getElementById('mainTime'),
  nextBirthdayTop: document.getElementById('nextBirthdayTop'),
  tMonths: document.getElementById('tMonths'),
  tWeeks: document.getElementById('tWeeks'),
  tDays: document.getElementById('tDays'),
  tHours: document.getElementById('tHours'),
  tMinutes: document.getElementById('tMinutes'),
  tSeconds: document.getElementById('tSeconds'),
  heartbeats: document.getElementById('heartbeats'),
  theme: document.getElementById('theme'),
  exact: document.getElementById('exact'),
  editBirth: document.getElementById('editBirth'),
  openMilestones: document.getElementById('openMilestones'),
  errorMessage: document.getElementById('errorMessage')
};

/**
 * Initialize birth date from localStorage or use default
 */
function initializeBirthDate() {
  try {
    const stored = localStorage.getItem('birth');
    if (stored) {
      const date = new Date(stored);
      if (isValidDate(date)) {
        birth = date;
        return;
      }
    }
  } catch (error) {
    console.warn('Error reading birth date from storage:', error);
  }
  birth = new Date(CONFIG.DEFAULT_BIRTH);
}

/**
 * Initialize name from localStorage or use default
 */
function initializeName() {
  try {
    const stored = localStorage.getItem('name');
    if (stored) {
      name = stored;
      elements.title.textContent = name;
      return;
    }
  } catch (error) {
    console.warn('Error reading name from storage:', error);
  }
  name = CONFIG.DEFAULT_NAME;
}

/**
 * Validate if a date object is valid
 */
function isValidDate(date) {
  return date instanceof Date && !isNaN(date.getTime());
}

/**
 * Get CSS custom property value from root element
 */
function getThemeColor(varName) {
  try {
    const value = getComputedStyle(document.documentElement)
      .getPropertyValue(varName)
      .trim();
    return value || '#ef4444';
  } catch {
    return '#ef4444';
  }
}

/**
 * Calculate exact age in years, months, and days
 */
function exactDiff(birthDate, currentDate) {
  let years = currentDate.getFullYear() - birthDate.getFullYear();
  let months = currentDate.getMonth() - birthDate.getMonth();
  let days = currentDate.getDate() - birthDate.getDate();

  if (days < 0) {
    months--;
    days += new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
  }

  if (months < 0) {
    years--;
    months += CONFIG.AVG_MONTHS_PER_YEAR;
  }

  return { years, months, days };
}

/**
 * Format a number as a zero-padded string
 */
function formatTime(value, digits = 2) {
  return String(value).padStart(digits, '0');
}

/**
 * Update all display elements with current life statistics
 */
function updateDisplay() {
  const now = new Date();
  const totalMs = now - birth;

  if (totalMs < 0) {
    showError('Birth date cannot be in the future');
    return;
  }

  const totalSec = Math.floor(totalMs / 1000);
  const totalMin = Math.floor(totalSec / 60);
  const totalHours = Math.floor(totalMin / 60);
  const totalDays = Math.floor(totalHours / 24);

  // Calculate years, months, days
  let years, months, days;
  if (elements.exact.checked) {
    ({ years, months, days } = exactDiff(birth, now));
  } else {
    years = Math.floor(totalDays / CONFIG.AVG_DAYS_PER_YEAR);
    const remainder = totalDays - years * CONFIG.AVG_DAYS_PER_YEAR;
    months = Math.floor(remainder / CONFIG.AVG_DAYS_PER_MONTH);
    days = Math.floor(remainder - months * CONFIG.AVG_DAYS_PER_MONTH);
  }

  // Calculate remaining time units
  const hours = Math.floor((totalSec % 86400) / 3600);
  const minutes = Math.floor((totalSec % 3600) / 60);
  const seconds = totalSec % 60;
  const milliseconds = totalMs % 1000;

  // Update main time display
  elements.mainTime.textContent =
    `${formatTime(years)}:${formatTime(months)}:${formatTime(days)}:` +
    `${formatTime(hours)}:${formatTime(minutes)}:${formatTime(seconds)}.` +
    `${formatTime(milliseconds, 3)}`;

  // Update statistics
  elements.tMonths.textContent = Math.floor(totalDays / CONFIG.AVG_DAYS_PER_MONTH).toLocaleString();
  elements.tWeeks.textContent = Math.floor(totalDays / 7).toLocaleString();
  elements.tDays.textContent = totalDays.toLocaleString();
  elements.tHours.textContent = totalHours.toLocaleString();
  elements.tMinutes.textContent = totalMin.toLocaleString();
  elements.tSeconds.textContent = totalSec.toLocaleString();

  // Calculate heartbeats
  const heartbeatsLived = Math.floor(totalMin * CONFIG.AVG_HEARTBEAT_BPM);
  elements.heartbeats.textContent = heartbeatsLived.toLocaleString();

  // Calculate days until next birthday
  let nextBirthday = new Date(birth);
  nextBirthday.setFullYear(now.getFullYear());
  if (nextBirthday < now) {
    nextBirthday.setFullYear(now.getFullYear() + 1);
  }
  const daysUntilBirthday = Math.ceil((nextBirthday - now) / 86400000);
  const birthdayText = `🎂 Next birthday in ${daysUntilBirthday} day${daysUntilBirthday !== 1 ? 's' : ''}`;
  elements.nextBirthdayTop.textContent = birthdayText;

}

/**
 * Animation loop for continuous updates
 */
function animationLoop() {
  updateDisplay();
  animationFrameId = requestAnimationFrame(animationLoop);
}

/**
 * Start the animation loop
 */
function startAnimation() {
  if (animationFrameId === null) {
    animationLoop();
  }
}

/**
 * Stop the animation loop
 */
function stopAnimation() {
  if (animationFrameId !== null) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
}

/**
 * Display error message
 */
function showError(message) {
  if (message) {
    elements.errorMessage.textContent = message;
    elements.errorMessage.classList.add('show');
  } else {
    elements.errorMessage.classList.remove('show');
  }
}

/**
 * Handle name change
 */
elements.title.addEventListener('click', () => {
  const newName = prompt('Enter name for the AGE Clock:', name);
  
  if (newName === null) return;
  
  const trimmedName = newName.trim();
  if (!trimmedName) {
    showError('Name cannot be empty');
    return;
  }

  try {
    localStorage.setItem('name', trimmedName);
    name = trimmedName;
    elements.title.textContent = name;
    showError('');
    updateDisplay();
  } catch (error) {
    showError('Failed to save name: ' + error.message);
  }
});

/**
 * Handle theme change
 */
elements.theme.addEventListener('change', () => {
  document.body.className = elements.theme.value;
  updateDisplay();
});

/**
 * Handle edit birth date button
 */
elements.editBirth.addEventListener('click', () => {
  const dateStr = prompt(
    'Enter birth date (YYYY-MM-DD HH:MM):\n\nCurrent: ' +
    birth.toISOString().slice(0, 16).replace('T', ' ')
  );

  if (!dateStr) return;

  const parsed = new Date(dateStr);
  if (!isValidDate(parsed)) {
    showError('Invalid format: use YYYY-MM-DD HH:MM');
    return;
  }

  if (parsed > new Date()) {
    showError('Birth date cannot be in the future');
    return;
  }

  try {
    localStorage.setItem('birth', parsed.toISOString());
    birth = parsed;
    showError('');
    updateDisplay();
  } catch (error) {
    showError('Failed to save: ' + error.message);
  }
});

/**
 * Open milestones page with the current birth date
 */
elements.openMilestones.addEventListener('click', () => {
  try {
    localStorage.setItem('birth', birth.toISOString());
    localStorage.setItem('name', name);
  } catch (error) {
    console.warn('Failed to refresh profile before opening milestones:', error);
  }

  window.location.href = CONFIG.MILESTONES_URL;
});

/**
 * Handle visibility change (tab focus)
 */
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopAnimation();
  } else {
    startAnimation();
  }
});

/**
 * Register service worker for PWA support
 */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').catch(error => {
    console.warn('Service Worker registration failed:', error);
  });
}

// Initialize and start
initializeBirthDate();
initializeName();
startAnimation();
</script>
</body>
</html>
