<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Life Milestones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg:#020617;
  --fg:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box}

html,body{
  margin:0;
  padding:0;
  height:100%;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#111827,var(--bg));
  font-family:'Courier New',monospace;
  color:var(--fg);
  padding:16px;
}

.card{
  width:100%;
  max-width:640px;
  padding:24px;
  border-radius:26px;
  background:var(--bg);
  border:2px solid transparent;
  background-image:
    linear-gradient(var(--bg),var(--bg)),
    linear-gradient(135deg,#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);
  background-origin:border-box;
  background-clip:padding-box,border-box;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.5),
    0 0 40px rgba(255,0,255,.25);
}

h1{
  text-align:center;
  font-size:14px;
  letter-spacing:2px;
  color:var(--muted);
  margin-bottom:12px;
}

.profile-heading{
  text-align:center;
  font-size:11px;
  color:var(--fg);
  line-height:1.5;
  margin:-6px 0 14px;
}

.profile-heading span{
  color:var(--muted);
}

.profile-heading .name{
  color:var(--fg);
}

.top-actions{
  display:flex;
  justify-content:space-between;
  gap:6px;
  margin-bottom:10px;
}

.top-actions button{
  background:none;
  border:1px solid #7f1d1d;
  color:#fecaca;
  border-radius:6px;
  font-size:11px;
  padding:4px 8px;
  cursor:pointer;
}

.add{
  display:flex;
  gap:6px;
  margin-bottom:14px;
}

.add input,.add select,.add button{
  background:#020617;
  color:var(--fg);
  border:1px solid #1f2937;
  border-radius:6px;
  padding:6px;
  font-family:inherit;
  font-size:12px;
}

.add input{flex:1}
.add button{cursor:pointer;font-weight:bold}

.item{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:10px 0;
  border-bottom:1px dashed rgba(255,255,255,.1);
  font-size:13px;
}

.item:last-child{border-bottom:none}

.label{color:var(--muted)}
.value{text-align:right}

.done{color:#22c55e}
.upcoming{color:#38bdf8}

.actions{
  margin-top:4px;
  display:flex;
  gap:6px;
  justify-content:flex-end;
}

.actions button{
  background:none;
  border:1px solid #1f2937;
  color:var(--muted);
  border-radius:4px;
  font-size:11px;
  padding:2px 6px;
  cursor:pointer;
}

.actions button:hover{
  color:var(--fg);
  border-color:#334155;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎯 LIFE MILESTONES</h1>
  <div class="profile-heading" id="profileHeading"></div>

  <!-- DELETE ALL -->
  <div class="top-actions">
    <button onclick="goBackToClock()">Back to Clock</button>
    <button onclick="deleteAll()">Delete All</button>
  </div>

  <!-- ADD -->
  <div class="add">
    <input type="number" id="val" placeholder="Value">
    <select id="unit">
      <option value="seconds">Seconds</option>
      <option value="minutes">Minutes</option>
      <option value="days">Days</option>
      <option value="weeks">Weeks</option>
      <option value="months">Months</option>
      <option value="years">Years</option>
    </select>
    <button id="addBtn">Add</button>
  </div>

  <div id="list"></div>
</div>

<script>
'use strict';

const DEFAULT_BIRTH = '2000-11-13T07:09:00';
const DEFAULT_NAME = 'SARATH P S - AGE Clock';

function loadBirth(){
  try{
    const params = new URLSearchParams(window.location.search);
    const passedBirth = params.get('birth');
    if(passedBirth){
      const parsedBirth = new Date(passedBirth);
      if(!Number.isNaN(parsedBirth.getTime())){
        localStorage.setItem('birth', parsedBirth.toISOString());
        return parsedBirth;
      }
    }

    const v = localStorage.getItem('birth');
    if(v) return new Date(v);
  }catch{}
  return new Date(DEFAULT_BIRTH);
}

function loadName(){
  try{
    const params = new URLSearchParams(window.location.search);
    const passedName = params.get('name');
    if(passedName){
      localStorage.setItem('name', passedName);
      return passedName;
    }

    const v = localStorage.getItem('name');
    if(v) return v;
  }catch{}
  return DEFAULT_NAME;
}

function loadStoredBirth(){
  try{
    const v = localStorage.getItem('birth');
    if(v){
      const d = new Date(v);
      if(!Number.isNaN(d.getTime())) return d;
    }
  }catch{}
  return null;
}

let birth = loadBirth();
let profileName = loadName();
const list = document.getElementById('list');
const profileHeading = document.getElementById('profileHeading');

let milestones = [
  { id:1, label:'1,000th Week', unit:'weeks', value:1000 },
  { id:3, label:'10,000th Day', unit:'days', value:10000 },
];

let uid = 100;

function fmt(d){
  return d.toLocaleString(undefined,{
    year:'numeric',month:'short',day:'2-digit',
    hour:'2-digit',minute:'2-digit',second:'2-digit'
  });
}

function renderProfileHeading(){
  profileHeading.textContent = '';

  const nameLine = document.createElement('span');
  nameLine.className = 'name';
  nameLine.textContent = profileName;

  const lineBreak = document.createElement('br');

  const birthLine = document.createElement('span');
  birthLine.textContent = `DOB: ${fmt(birth)}`;

  profileHeading.append(nameLine, lineBreak, birthLine);
}

function calcDate(v,u){
  const d = new Date(birth);
  if(u==='seconds') d.setSeconds(d.getSeconds()+v);
  if(u==='minutes') d.setMinutes(d.getMinutes()+v);
  if(u==='days') d.setDate(d.getDate()+v);
  if(u==='weeks') d.setDate(d.getDate()+v*7);
  if(u==='months') d.setMonth(d.getMonth()+v);
  if(u==='years') d.setFullYear(d.getFullYear()+v);
  return d;
}

function render(){
  list.innerHTML='';
  const now = new Date();

  milestones
    .map(m=>({...m,date:calcDate(m.value,m.unit)}))
    .sort((a,b)=>a.date-b.date)
    .forEach(m=>{
      const done = m.date < now;
      const div = document.createElement('div');
      div.className='item';
      div.innerHTML=`
        <div class="label">${m.label}</div>
        <div class="value">
          ${fmt(m.date)}<br>
          <span class="${done?'done':'upcoming'}">
            ${done?'✔ Completed':'⏳ Upcoming'}
          </span>
          <div class="actions">
            <button onclick="editMilestone(${m.id})">Edit</button>
            <button onclick="deleteMilestone(${m.id})">Delete</button>
          </div>
        </div>
      `;
      list.appendChild(div);
    });
}

window.editMilestone = function(id){
  const m = milestones.find(x=>x.id===id);
  if(!m) return;

  const v = prompt('Edit value:', m.value);
  if(v===null) return;

  const u = prompt('Edit unit (seconds, minutes, days, weeks, months, years):', m.unit);
  if(!u) return;

  m.value = Number(v);
  m.unit = u;
  m.label = `${Number(v).toLocaleString()} ${u}`;
  render();
};

window.deleteMilestone = function(id){
  if(!confirm('Delete this milestone?')) return;
  milestones = milestones.filter(m=>m.id!==id);
  render();
};

window.deleteAll = function(){
  if(!confirm('Delete ALL milestones? This cannot be undone.')) return;
  milestones = [];
  render();
};

window.goBackToClock = function(){
  const clockUrl = new URL('index.html', window.location.href);
  window.location.href = clockUrl.href;
};

function refreshProfileFromStorage(){
  try{
    const storedName = localStorage.getItem('name');
    if(storedName) profileName = storedName;

    const storedBirth = loadStoredBirth();
    if(storedBirth) birth = storedBirth;

    renderProfileHeading();
    render();
  }catch{}
}

window.addEventListener('storage', event=>{
  if(event.key === 'name' || event.key === 'birth'){
    refreshProfileFromStorage();
  }
});

window.addEventListener('focus', refreshProfileFromStorage);

addBtn.onclick=()=>{
  const v = Number(val.value);
  const u = unit.value;
  if(!v || v<=0) return;

  milestones.push({
    id:++uid,
    label:`${v.toLocaleString()} ${u}`,
    value:v,
    unit:u
  });

  val.value='';
  render();
};

renderProfileHeading();
render();
</script>

</body>
</html>
